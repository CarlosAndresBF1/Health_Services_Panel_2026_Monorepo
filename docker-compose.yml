# ─────────────────────────────────────────────────────────────────────────────
# HealthPanel - Docker Compose (Development)
# Hot reload enabled for api and panel services.
# Usage: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────
name: healthpanel

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: healthpanel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${PORT_DB:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthpanel

  # ─── API (NestJS) ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: healthpanel_api
    restart: unless-stopped
    ports:
      - "${PORT_API:-3045}:3000"
    volumes:
      # Hot reload: mount source directories only (node_modules stay inside container)
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - screenshots:/app/screenshots
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Database - always point to internal service, not host port
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Email / SendGrid
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
      # Monitor
      DEFAULT_CHECK_INTERVAL: ${DEFAULT_CHECK_INTERVAL:-60}
      SCREENSHOT_TIMEOUT: ${SCREENSHOT_TIMEOUT:-15000}
      # Seeder
      SEED_USER: ${SEED_USER}
      SEED_PASSWORD: ${SEED_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthpanel

  # ─── Panel (Next.js) ────────────────────────────────────────────────────────
  panel:
    build:
      context: .
      dockerfile: apps/panel/Dockerfile.dev
    container_name: healthpanel_panel
    restart: unless-stopped
    ports:
      - "${PORT_PANEL:-3044}:3000"
    volumes:
      # Hot reload: mount source directories only
      - ./apps/panel/src:/app/apps/panel/src
      - ./packages/shared/src:/app/packages/shared/src
    environment:
      # WebSocket must be a public URL (Next.js rewrites don't support WS upgrades)
      NEXT_PUBLIC_WS_URL: ws://localhost:${PORT_API:-3045}
      # Internal Docker network URL for server-side fetches (Next.js API routes + rewrites)
      API_INTERNAL_URL: http://api:3000
    depends_on:
      - api
    networks:
      - healthpanel

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  screenshots:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  healthpanel:
    driver: bridge
