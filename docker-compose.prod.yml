# ─────────────────────────────────────────────────────────────────────────────
# HealthPanel - Docker Compose (Production)
# Uses production Dockerfiles. No source-code volume mounts.
# Usage: docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
name: healthpanel

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: healthpanel_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${PORT_DB:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - healthpanel

  # ─── API (NestJS) ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: healthpanel_api
    restart: always
    ports:
      - "${PORT_API:-3045}:3000"
    volumes:
      - screenshots:/app/screenshots
    environment:
      NODE_ENV: production
      # Database - always point to internal service name
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Email / SendGrid
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
      # Monitor
      DEFAULT_CHECK_INTERVAL: ${DEFAULT_CHECK_INTERVAL:-60}
      SCREENSHOT_TIMEOUT: ${SCREENSHOT_TIMEOUT:-15000}
      # Seeder
      SEED_USER: ${SEED_USER}
      SEED_PASSWORD: ${SEED_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - healthpanel

  # ─── Panel (Next.js) ────────────────────────────────────────────────────────
  panel:
    build:
      context: .
      dockerfile: apps/panel/Dockerfile
    container_name: healthpanel_panel
    restart: always
    ports:
      - "${PORT_PANEL:-3044}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3045}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:3045}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - healthpanel

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  screenshots:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  healthpanel:
    driver: bridge
