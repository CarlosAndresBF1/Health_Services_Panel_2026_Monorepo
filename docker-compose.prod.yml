# ─────────────────────────────────────────────────────────────────────────────
# HealthPanel - Docker Compose (Production)
# Uses production Dockerfiles. No source-code volume mounts.
# Usage: docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
name: healthpanel

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: healthpanel_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${PORT_DB:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - healthpanel

  # ─── API (NestJS) ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: healthpanel_api
    restart: always
    expose:
      - "3000"
    volumes:
      - screenshots:/app/screenshots
    environment:
      NODE_ENV: production
      # Database - always point to internal service name
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Email / SendGrid
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
      # Monitor
      DEFAULT_CHECK_INTERVAL: ${DEFAULT_CHECK_INTERVAL:-60}
      SCREENSHOT_TIMEOUT: ${SCREENSHOT_TIMEOUT:-15000}
      # Seeder
      SEED_USER: ${SEED_USER}
      SEED_PASSWORD: ${SEED_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - healthpanel

  # ─── Panel (Next.js) ────────────────────────────────────────────────────────
  panel:
    build:
      context: .
      dockerfile: apps/panel/Dockerfile
    container_name: healthpanel_panel
    restart: always
    expose:
      - "3000"
    environment:
      # No WS_URL needed — Nginx proxies /socket.io/ on the same origin
      # Internal Docker network URL for Next.js rewrites (/backend/:path* → api)
      API_INTERNAL_URL: http://api:3000
      # Set to "true" only if serving over HTTPS
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - healthpanel

  # ─── Nginx (Reverse Proxy) ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: healthpanel_nginx
    restart: always
    ports:
      - "${PORT_PUBLIC:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      panel:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    networks:
      - healthpanel

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  screenshots:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  healthpanel:
    driver: bridge
