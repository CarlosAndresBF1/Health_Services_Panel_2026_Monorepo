    </defs>
    <!-- Shield body -->
    <path d="M256 28L60 120v140c0 110 84 196 196 224 112-28 196-114 196-224V120L256 28z" fill="#111827" stroke="url(#shieldGrad)" stroke-width="24" stroke-linejoin="round"/>
